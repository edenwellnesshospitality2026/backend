name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Deploy to Hostinger VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            export APP_DIR="${{ secrets.APP_DIR }}"
            export REPO_URL="https://github.com/edenwellnesshospitality2026/backend.git"
            export BRANCH="main"
            export APP_ENV_FILE='${{ secrets.APP_ENV_FILE }}'
            bash -s <<'EOF'
            set -euo pipefail
            if [ -z "${APP_DIR:-}" ]; then
              echo "APP_DIR secret is required"
              exit 1
            fi

            mkdir -p "$APP_DIR"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            if [ -n "${APP_ENV_FILE:-}" ]; then
              printf "%s" "$APP_ENV_FILE" > .env
              chmod 600 .env
            fi

            docker compose down
            docker compose up -d --build
            docker image prune -f
            EOF
